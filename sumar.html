			function drawChartValueBadge(ctx, text, x, y, options) {
				const config = options || {};
				ctx.save();
				ctx.font = config.font || '700 10px IBM Plex Sans';
				ctx.textAlign = 'center';
				ctx.textBaseline = 'middle';
				const textWidth = ctx.measureText(text).width;
				const width = textWidth + ((config.horizontalPadding != null ? config.horizontalPadding : 8) * 2);
				const height = config.height != null ? config.height : 22;
				drawRoundedRect(ctx, x - (width / 2), y - (height / 2), width, height, config.radius != null ? config.radius : 999);
				ctx.fillStyle = config.backgroundColor || getThemeColor('--badge-bg', 'rgba(255,255,255,0.98)');
				ctx.fill();
				if (config.borderColor) {
					ctx.lineWidth = config.borderWidth != null ? config.borderWidth : 1;
					ctx.strokeStyle = config.borderColor;
					ctx.stroke();
				}
				ctx.fillStyle = config.textColor || getThemeColor('--badge-text', '#0f172a');
				ctx.fillText(text, x, y);
				ctx.restore();
			}

			const staticValueLabelsPlugin = {
				id: 'staticValueLabels',
				afterDatasetsDraw: function(chart, args, pluginOptions) {
					if (!pluginOptions || pluginOptions.display === false) {
						return;
					}
					const visibleMetas = chart.getSortedVisibleDatasetMetas();
					if (!visibleMetas.length) {
						return;
					}
					const ctx = chart.ctx;
					const chartTop = chart.chartArea ? chart.chartArea.top : 0;
					const chartBottom = chart.chartArea ? chart.chartArea.bottom : chart.height;
					ctx.save();
					visibleMetas.forEach(function(meta, visibleIndex) {
						const dataset = chart.data.datasets[meta.index];
						if (!chart.isDatasetVisible(meta.index)) {
							return;
						}
						meta.data.forEach(function(element, dataIndex) {
							const rawValue = dataset.data[dataIndex];
							if (rawValue === null || rawValue === undefined || rawValue === '') {
								return;
							}
							const props = typeof element.getProps === 'function' ? element.getProps(['x', 'y'], true) : element.tooltipPosition();
							const badgeY = Math.max(chartTop + 12, Math.min(chartBottom - 12, Number(props.y || 0) - 16 - ((visibleMetas.length - visibleIndex - 1) * 18)));
							drawChartValueBadge(ctx, shortMetric(rawValue, dataset.valueFormat), Number(props.x || 0), badgeY, {
								font: '700 10px IBM Plex Sans',
								backgroundColor: getThemeColor('--badge-bg', 'rgba(255,255,255,0.98)'),
								textColor: dataset.labelColor || getThemeColor('--badge-text', '#0f172a'),
								borderColor: dataset.borderColor || getThemeColor('--badge-border', 'rgba(15,23,42,0.16)'),
								borderWidth: 1,
							});
						});
					});
					ctx.restore();
				}
			};

				CHART_SECONDARY_FILTER_ORDER.forEach(function(filterKey) {
					options.push({

						label: CHART_MONTH_FILTERS[filterKey].label,

						options: options.filter(function(option) { return option.group === 'primary'; })

						key: 'month',
						label: 'Jednotlivé mesiace',
						copy: '',
						options: options.filter(function(option) { return option.group === 'month'; })

					return Array.isArray(group.options) && group.options.length;

				const options = getChartMonthFilterOptions(months);
				for (let index = 0; index < options.length; index += 1) {

						return options[index];

			function renderMoversPanel(payload, currentNode) {
				const container = document.getElementById('moversPanel');
				const moverContext = buildMoverContext(payload, currentNode);
				const entries = moverContext.nodes.map(function(node) {
					const snapshot = getMetricSnapshotForFilter(node, state.selectedMetric, payload.months || [], state.selectedChartMonthFilter);
					return {
						node: node,
						snapshot: snapshot,
						delta: Number(snapshot.delta || 0),
						attainment: getAttainmentPercent(snapshot.plan, snapshot.forecast),
						path: getNodePath(payload, node.id).join(' • '),
					};
				});

				if (entries.length < 2) {
					container.innerHTML = ''
						+ '<div>'
						+ '<div class="panel-title">Top / Bottom movers</div>'
						+ '<h2 style="margin:0;">V tejto vetve zatiaľ nie je porovnanie</h2>'
						+ '</div>'
						+ '<div class="movers-empty">Aktuálny výber nemá dostatok relevantných uzlov na porovnanie. Skús kliknúť o level vyššie alebo nižšie v hierarchii.</div>';
					return;
				}

				const topEntries = entries.slice().sort(function(left, right) {

			function getRelevantRollupNodes(payload, currentNode, targetType) {
				const activeType = String((currentNode && currentNode.type) || '').toUpperCase();
				if (!currentNode || !targetType) {
					return [];
				}

				if (targetType === 'GF') {
					if (activeType === 'GLOBAL') {
						return getImmediateChildrenByType(payload, currentNode, 'GF');
					}
					if (activeType === 'GF') {
						return [currentNode];
					}
					if (activeType === 'VKL') {
						return getParentNodesByType(payload, currentNode, 'GF');
					}
					if (activeType === 'STORE') {
						const parentVkl = getNode(payload, currentNode.parentId);
						return parentVkl ? getParentNodesByType(payload, parentVkl, 'GF') : [];
					}
				}

				if (targetType === 'VKL') {
					if (activeType === 'GLOBAL') {
						return collectDescendantNodesByType(payload, currentNode.id, 'VKL');
					}
					if (activeType === 'GF') {
						return getImmediateChildrenByType(payload, currentNode, 'VKL');
					}
					if (activeType === 'VKL') {
						return [currentNode];
					}
					if (activeType === 'STORE') {
						const parentNode = getNode(payload, currentNode.parentId);
						return parentNode && String(parentNode.type || '').toUpperCase() === 'VKL' ? [parentNode] : [];
					}
				}

				if (targetType === 'STORE') {
					if (activeType === 'VKL') {
						return getImmediateChildrenByType(payload, currentNode, 'STORE');
					}
				}

				return [];
			}

			function getImmediateChildrenByType(payload, node, targetType) {
				return (node.childIds || []).map(function(childId) {
					return getNode(payload, childId);
				}).filter(function(childNode) {
					return childNode && String(childNode.type || '').toUpperCase() === targetType;
				});
			}

			function getParentNodesByType(payload, node, targetType) {
				const result = [];
				let activeId = node ? node.parentId : '';
				while (activeId) {
					const parentNode = getNode(payload, activeId);
					if (!parentNode) {
						break;
					}
					if (String(parentNode.type || '').toUpperCase() === targetType) {
						result.push(parentNode);
						break;
					}
					activeId = parentNode.parentId;
				}
				return result;
			}

			function collectDescendantNodesByType(payload, nodeId, targetType) {
				const startNode = getNode(payload, nodeId);
				if (!startNode) {
					return [];
				}
				const result = [];
				(startNode.childIds || []).forEach(function(childId) {
					const childNode = getNode(payload, childId);
					if (!childNode) {
						return;
					}
					if (String(childNode.type || '').toUpperCase() === targetType) {
						result.push(childNode);
					}
					result.push.apply(result, collectDescendantNodesByType(payload, childNode.id, targetType));
				});
				return result;
			}

			function renderOrUpdateChart(id, config) {

			function getCurrentNode(payload) {
				return getNode(payload, state.selectedNodeId) || getNode(payload, payload.defaultNodeId || (payload.hierarchy ? payload.hierarchy.rootId : ''));
			}

			function getNode(payload, nodeId) {
				return payload && payload.hierarchy && payload.hierarchy.nodes ? payload.hierarchy.nodes[nodeId] : null;
			}

			function getNodePath(payload, nodeId) {
				const labels = [];
				let activeId = nodeId;
				while (activeId) {
					const node = getNode(payload, activeId);
					if (!node) {
						break;
					}
					labels.unshift(node.label);
					activeId = node.parentId;
				}
				return labels;
			}

			function expandNodeAncestors(payload, nodeId) {
				let activeId = nodeId;
				while (activeId) {
					state.expandedNodes[activeId] = true;

					activeId = node ? node.parentId : '';

			function findMetric(node, metric) {
				return node.metrics.find(function(item) { return normalizeMetricName(item.metric) === normalizeMetricName(metric); }) || { metric: metric, format: 'number', rows: [] };
			}

			function findRow(metricSection, type) {
				return metricSection.rows.find(function(row) { return row.type === type; }) || { values: [], total: 0 };
			}

			function sumMetricValues(values, indexes) {
				if (!Array.isArray(values) || !values.length) {
					return 0;
				}
				if (Array.isArray(indexes) && indexes.length) {
					return indexes.reduce(function(sum, index) {
						return sum + Number(values[index] || 0);
					}, 0);
				}
				return values.reduce(function(sum, value) {
					return sum + Number(value || 0);
				}, 0);
			}

			function shouldUsePlanFallbackForMetric(metric) {
				return [
					'Čistý výkon',
					'Hodiny netto',
					'Obrat GJ2026'
				].some(function(fallbackMetric) {
					return normalizeMetricName(fallbackMetric) === normalizeMetricName(metric);
				});
			}

			function hasMetricRowRealData(row, indexes) {
				const targetIndexes = Array.isArray(indexes) && indexes.length
					? indexes
					: null;
				if (Array.isArray(row.hasRealFlags) && row.hasRealFlags.length) {
					return (targetIndexes || row.hasRealFlags.map(function(flag, index) { return index; })).some(function(index) {
						return Boolean(row.hasRealFlags[index]);
					});
				}
				if (Array.isArray(row.actualValues) && row.actualValues.length) {
					return (targetIndexes || row.actualValues.map(function(value, index) { return index; })).some(function(index) {
						return Math.abs(Number(row.actualValues[index] || 0)) > 0.0001;
					});
				}
				if (Array.isArray(row.values) && row.values.length) {
					return (targetIndexes || row.values.map(function(value, index) { return index; })).some(function(index) {
						return Math.abs(Number(row.values[index] || 0)) > 0.0001;
					});
				}
				return Math.abs(Number(row.actualTotal || row.total || 0)) > 0.0001;
			}

			function hasFallbackRealDisplay(metric, row, months, indexes) {
				if (!shouldUsePlanFallbackForMetric(metric) || !row) {
					return false;
				}

				const activeIndexes = Array.isArray(indexes) && indexes.length
					? indexes
					: (Array.isArray(row.values) ? row.values.map(function(value, index) { return index; }) : []);

				return activeIndexes.some(function(index) {
					const monthLabel = Array.isArray(months) ? months[index] : '';
					if (monthLabel && isChartMonthClosed(monthLabel)) {
						return false;
					}
					return !hasActualRealValue(row, index);
				});
			}

			function getDisplayedMetricValue(metric, planRow, realRow, index) {
				if (hasActualRealValue(realRow, index)) {
					return getActualRealValue(realRow, index);
				}

				if (Array.isArray(realRow && realRow.values)) {
					const displayedValue = Number(realRow.values[index] || 0);
					if (Math.abs(displayedValue) > 0.0001 || !shouldUsePlanFallbackForMetric(metric)) {
						return displayedValue;
					}
				}

				if (shouldUsePlanFallbackForMetric(metric)) {
					return Number(planRow && planRow.values ? planRow.values[index] : 0);
				}

				return Number(realRow && realRow.values ? realRow.values[index] : 0);
			}

			function buildCleanPerformanceComputation(node, indexes, months) {
				const turnoverMetric = findMetric(node, 'Obrat GJ2026');
				const hoursMetric = findMetric(node, 'Hodiny netto');
				const turnoverPlanRow = findRow(turnoverMetric, 'plan');
				const turnoverRealRow = findRow(turnoverMetric, 'real');
				const turnoverForecastRow = findRow(turnoverMetric, 'forecast');
				const hoursPlanRow = findRow(hoursMetric, 'plan');
				const hoursRealRow = findRow(hoursMetric, 'real');
				const hoursForecastRow = findRow(hoursMetric, 'forecast');
				const monthCount = Math.max(
					Array.isArray(turnoverPlanRow.values) ? turnoverPlanRow.values.length : 0,
					Array.isArray(turnoverRealRow.values) ? turnoverRealRow.values.length : 0,
					Array.isArray(turnoverForecastRow.values) ? turnoverForecastRow.values.length : 0,
					Array.isArray(hoursPlanRow.values) ? hoursPlanRow.values.length : 0,
					Array.isArray(hoursRealRow.values) ? hoursRealRow.values.length : 0,
					Array.isArray(hoursForecastRow.values) ? hoursForecastRow.values.length : 0
				);
				const hasIndexes = Array.isArray(indexes) && indexes.length;
				const activeIndexes = hasIndexes
					? indexes
					: Array.from({ length: monthCount }, function(value, index) { return index; });
				const toPerformanceValue = function(turnoverValue, hourValue) {
					return Number(hourValue || 0) ? Number(turnoverValue || 0) / Number(hourValue || 0) : 0;
				};
				const planValues = [];
				const realValues = [];
				const actualValues = [];
				const forecastValues = [];
				const deltaValues = [];
				const hasRealFlags = [];
				const displayedTurnoverValues = [];
				const displayedHourValues = [];

				Array.from({ length: monthCount }, function(value, index) { return index; }).forEach(function(index) {
					const planTurnover = Number(turnoverPlanRow.values && turnoverPlanRow.values[index] || 0);
					const planHours = Number(hoursPlanRow.values && hoursPlanRow.values[index] || 0);
					const hasActual = hasActualRealValue(turnoverRealRow, index) && hasActualRealValue(hoursRealRow, index);
					const actualTurnover = hasActual ? getActualRealValue(turnoverRealRow, index) : 0;
					const actualHours = hasActual ? getActualRealValue(hoursRealRow, index) : 0;
					const displayedTurnover = getDisplayedMetricValue('Obrat GJ2026', turnoverPlanRow, turnoverRealRow, index);
					const displayedHours = getDisplayedMetricValue('Hodiny netto', hoursPlanRow, hoursRealRow, index);
					const forecastTurnover = Number(turnoverForecastRow.values && turnoverForecastRow.values[index] || 0);
					const forecastHours = Number(hoursForecastRow.values && hoursForecastRow.values[index] || 0);

					planValues.push(toPerformanceValue(planTurnover, planHours));
					realValues.push(toPerformanceValue(displayedTurnover, displayedHours));
					actualValues.push(hasActual ? toPerformanceValue(actualTurnover, actualHours) : 0);
					forecastValues.push(toPerformanceValue(forecastTurnover, forecastHours));
					deltaValues.push(forecastValues[index] - realValues[index]);
					hasRealFlags.push(hasActual);
					displayedTurnoverValues.push(displayedTurnover);
					displayedHourValues.push(displayedHours);
				});

				const planTurnoverTotal = sumMetricValues(turnoverPlanRow.values || [], activeIndexes);
				const planHourTotal = sumMetricValues(hoursPlanRow.values || [], activeIndexes);
				const displayedTurnoverTotal = sumMetricValues(displayedTurnoverValues, activeIndexes);
				const displayedHourTotal = sumMetricValues(displayedHourValues, activeIndexes);
				const forecastTurnoverTotal = sumMetricValues(turnoverForecastRow.values || [], activeIndexes);
				const forecastHourTotal = sumMetricValues(hoursForecastRow.values || [], activeIndexes);
				const plan = toPerformanceValue(planTurnoverTotal, planHourTotal);
				const real = toPerformanceValue(displayedTurnoverTotal, displayedHourTotal);
				const forecast = toPerformanceValue(forecastTurnoverTotal, forecastHourTotal);
				const hasReal = hasMetricRowRealData(turnoverRealRow, indexes)
					&& hasMetricRowRealData(hoursRealRow, indexes);
				const isRealFallback = hasFallbackRealDisplay('Obrat GJ2026', turnoverRealRow, months, activeIndexes)
					|| hasFallbackRealDisplay('Hodiny netto', hoursRealRow, months, activeIndexes);

				return {
					metric: 'Čistý výkon',
					format: 'number',
					plan: plan,
					real: real,
					adjustment: forecast,
					forecast: forecast,
					delta: forecast - real,
					hasReal: hasReal,
					isRealFallback: isRealFallback,
					planValues: planValues,
					realValues: realValues,
					actualValues: actualValues,
					forecastValues: forecastValues,
					deltaValues: deltaValues,
					hasRealFlags: hasRealFlags,
				};
			}

			function buildStandardMetricComputation(node, metric, months, indexes) {
				const metricSection = findMetric(node, metric);
				const planRow = findRow(metricSection, 'plan');
				const realRow = findRow(metricSection, 'real');
				const adjustmentRow = findRow(metricSection, 'adjustment');
				const forecastRow = findRow(metricSection, 'forecast');
				const deltaRow = findRow(metricSection, 'delta');
				const hasIndexes = Array.isArray(indexes) && indexes.length;
				const series = {
					plan: Array.isArray(planRow.values) ? planRow.values : [],
					real: Array.isArray(realRow.values) ? realRow.values : [],
					adjustment: Array.isArray(adjustmentRow.values) ? adjustmentRow.values : [],
					forecast: Array.isArray(forecastRow.values) ? forecastRow.values : [],
					delta: Array.isArray(deltaRow.values) ? deltaRow.values : [],
				};
				const activeSeries = hasIndexes ? pickDataSeriesByIndexes(series, indexes) : series;

				return {
					metric: metricSection.metric || metric,
					format: metricSection.format || 'number',
					plan: hasIndexes ? summarizeMetricSeries(metric, activeSeries.plan) : Number(planRow.total || 0),
					real: hasIndexes ? summarizeMetricSeries(metric, activeSeries.real) : Number(realRow.total || 0),
					adjustment: hasIndexes ? summarizeMetricSeries(metric, activeSeries.adjustment) : Number(adjustmentRow.total || 0),
					forecast: hasIndexes ? summarizeMetricSeries(metric, activeSeries.forecast) : Number(forecastRow.total || 0),
					delta: hasIndexes ? summarizeMetricSeries(metric, activeSeries.delta) : Number(deltaRow.total || 0),
					hasReal: hasMetricRowRealData(realRow, hasIndexes ? indexes : null),
					isRealFallback: hasFallbackRealDisplay(metric, realRow, months || [], hasIndexes ? indexes : null),
					series: series,
				};
			}

			function buildMetricComputation(node, metric, months, indexes) {
				if (normalizeMetricName(metric) === normalizeMetricName('Čistý výkon')) {
					const cleanPerformance = buildCleanPerformanceComputation(node, indexes, months || []);
					return {
						metric: cleanPerformance.metric,
						format: cleanPerformance.format,
						plan: cleanPerformance.plan,
						real: cleanPerformance.real,
						adjustment: cleanPerformance.adjustment,
						forecast: cleanPerformance.forecast,
						delta: cleanPerformance.delta,
						hasReal: cleanPerformance.hasReal,
						isRealFallback: cleanPerformance.isRealFallback,
						series: {
							plan: cleanPerformance.planValues,
							real: cleanPerformance.realValues,
							adjustment: cleanPerformance.forecastValues,
							forecast: cleanPerformance.forecastValues,
							delta: cleanPerformance.deltaValues,
						},
					};
				}

				return buildStandardMetricComputation(node, metric, months || [], indexes);
			}

			function toMetricSnapshot(computation) {
				return {
					format: computation.format,
					plan: computation.plan,
					real: computation.real,
					adjustment: computation.adjustment,
					forecast: computation.forecast,
					delta: computation.delta,
					hasReal: computation.hasReal,
					isRealFallback: computation.isRealFallback,
					realPctVsPlan: getPercentDeltaVsPlan(computation.plan, computation.real),
					forecastPctVsPlan: getPercentDeltaVsPlan(computation.plan, computation.forecast),
					deltaPctVsPlan: getDeltaPercentVsPlan(computation.plan, computation.delta),
				};
			}

			function getMetricSnapshot(node, metric) {
				return toMetricSnapshot(buildMetricComputation(node, metric, state.summary && state.summary.months ? state.summary.months : [], null));
			}

			function getMetricSnapshotForFilter(node, metric, months, filterKey) {
				if (!node || !metric || !months) {
					return getMetricSnapshot(node, metric);
				}
				const indexes = getMonthIndexesByFilter(months || [], filterKey);
				return toMetricSnapshot(buildMetricComputation(node, metric, months || [], indexes));
			}

			function getMetricSeries(node, metric) {
				const computation = buildMetricComputation(node, metric, state.summary && state.summary.months ? state.summary.months : [], null);
				return {
					metric: computation.metric,
					format: computation.format,
					plan: computation.series.plan,
					real: computation.series.real,
					adjustment: computation.series.adjustment,
					forecast: computation.series.forecast,
					delta: computation.series.delta,
				};
			}

			function buildMetricInsight(payload, node, metric) {
				const months = payload.months || [];
				const series = getMetricSeries(node, metric);
				const snapshot = getMetricSnapshot(node, metric);
				const closedIndexes = months.reduce(function(result, month, index) {
					if (isChartMonthClosed(month)) {
						result.push(index);
					}
					return result;
				}, []);
				const openIndexes = months.reduce(function(result, month, index) {
					if (!isChartMonthClosed(month)) {
						result.push(index);
					}
					return result;
				}, []);
				const closedSnapshot = toMetricSnapshot(buildMetricComputation(node, metric, months, closedIndexes));
				const closedPlan = closedSnapshot.plan;
				const closedReal = closedSnapshot.real;
				const closedAttainment = getAttainmentPercent(closedPlan, closedReal);
				const trend = getSeriesTrend(metric, series.forecast);
				const peakMonth = getExtremumMonth(months, series.forecast, 'max');
				const dipMonth = getExtremumMonth(months, series.forecast, 'min');
				const attainment = getAttainmentPercent(snapshot.plan, snapshot.forecast);
				const headline = buildInsightHeadline(metric, snapshot, trend, peakMonth);
				const copy = buildInsightCopy(metric, snapshot, closedIndexes.length, openIndexes.length, trend);
				return {
					headline: headline,
					copy: copy,
					attainmentLabel: numberFormatter.format(attainment) + '% voči ročnému plánu',
					attainmentCopy: 'Odchýlka ' + getDisplayForecastLabel() + ' voči ročnému plánu je ' + formatSignedMetric(snapshot.forecast - snapshot.plan, snapshot.format) + '.',
					attainmentClass: getVarianceClass(snapshot.forecast - snapshot.plan),
					closedLabel: closedIndexes.length ? numberFormatter.format(closedAttainment) + '% v uzavretých mesiacoch' : 'Zatiaľ bez uzavretých mesiacov',
					closedCopy: closedIndexes.length ? 'IST proti plánu v uzavretej časti roka sleduje tempo ' + formatMetric(closedReal, snapshot.format) + ' vs ' + formatMetric(closedPlan, snapshot.format) + '.' : 'Po uzavretí prvých mesiacov sa tu zobrazí presné tempo IST voči plánu.',
					closedClass: getVarianceClass(closedReal - closedPlan),
					trendLabel: trend.label,
					trendCopy: trend.copy,
					trendClass: trend.className,
					extremumLabel: peakMonth.label + ' / ' + dipMonth.label,
					extremumCopy: 'Najsilnejší mesiac predikcie je ' + peakMonth.label + ' (' + formatMetric(peakMonth.value, snapshot.format) + '), najslabší je ' + dipMonth.label + ' (' + formatMetric(dipMonth.value, snapshot.format) + ').',
					quarters: buildQuarterSummaries(node, metric, snapshot.format, months, series),
					journeySubtitle: 'Farebný tón ukazuje ' + getDisplayDeltaContextLabel() + ' v jednotlivých mesiacoch.',
					monthCards: months.map(function(month, index) {
						const monthSnapshot = toMetricSnapshot(buildMetricComputation(node, metric, months, [index]));
						const deltaValue = Number((series.delta && series.delta[index]) || 0);
						return {
							label: formatMonthShort(month),
							status: isChartMonthClosed(month) ? 'Uzavretý' : 'Otvorený',
							className: getVarianceClass(deltaValue),
							plan: formatMetric(series.plan[index], snapshot.format),
							planMeta: '',
							realLabel: getDisplayRealIndicatorLabel(metric, monthSnapshot),
							real: formatMetric(series.real[index], snapshot.format),
							realClass: getVarianceClass(Number(series.real[index] || 0) - Number(series.plan[index] || 0)),
							realMeta: monthSnapshot.hasReal ? formatPercentMeta(monthSnapshot.realPctVsPlan) : '',
							forecast: formatMetric(series.forecast[index], snapshot.format),
							forecastClass: getVarianceClass(Number(series.forecast[index] || 0) - Number(series.plan[index] || 0)),
							forecastMeta: formatPercentMeta(monthSnapshot.forecastPctVsPlan),
							delta: formatSignedMetric(deltaValue, snapshot.format),
							deltaClass: getVarianceClass(deltaValue),
							deltaMeta: formatPercentMeta(monthSnapshot.deltaPctVsPlan),
						};
					})
				};
			}

			function buildQuarterSummaries(node, metric, format, months, series) {
				return ['q1', 'q2', 'q3', 'q4'].map(function(quarterKey) {
					const indexes = months.reduce(function(result, month, index) {
						if (getChartQuarterKey(month) === quarterKey) {
							result.push(index);
						}
						return result;
					}, []);
					const quarterSnapshot = toMetricSnapshot(buildMetricComputation(node, metric, months, indexes));
					const plan = quarterSnapshot.plan;
					const real = quarterSnapshot.real;
					const forecast = quarterSnapshot.forecast;
					const deltaValue = quarterSnapshot.delta;
					const closedCount = indexes.filter(function(index) {
						return isChartMonthClosed(months[index]);
					}).length;
					return {
						key: quarterKey.toUpperCase(),
						plan: formatMetric(plan, format),
						planMeta: '',
						realLabel: getDisplayRealIndicatorLabel(metric, quarterSnapshot),
						real: formatMetric(real, format),
						realClass: getVarianceClass(real - plan),
						realMeta: quarterSnapshot.hasReal ? formatPercentMeta(quarterSnapshot.realPctVsPlan) : '',
						forecast: formatMetric(forecast, format),
						forecastClass: getVarianceClass(forecast - plan),
						forecastMeta: formatPercentMeta(quarterSnapshot.forecastPctVsPlan),
						delta: formatSignedMetric(deltaValue, format),
						className: getVarianceClass(deltaValue),
						deltaClass: getVarianceClass(deltaValue),
						deltaMeta: formatPercentMeta(quarterSnapshot.deltaPctVsPlan),
						status: closedCount === indexes.length && indexes.length ? 'Uzavretý' : closedCount ? 'Mix IST/' + getDisplayForecastLabel() : getDisplayForecastLabel(),
						copy: getDisplayPlanLabel() + ' ' + formatMetric(plan, format) + ' • ' + getDisplayForecastLabel() + ' ' + formatMetric(forecast, format),
					};
				});
			}

			function getPercentDeltaVsPlan(plan, value) {
				return Number(plan || 0) ? ((Number(value || 0) - Number(plan || 0)) / Number(plan || 0)) * 100 : null;
			}

			function getDeltaPercentVsPlan(plan, delta) {
				return Number(plan || 0) ? (Number(delta || 0) / Number(plan || 0)) * 100 : null;
			}

			function summarizeMetricSeries(metric, values) {
				if (normalizeMetricName(metric) === normalizeMetricName('Čistý výkon')) {
					return values.length ? values.reduce(function(sum, value) { return sum + Number(value || 0); }, 0) / values.length : 0;
				}
				return values.reduce(function(sum, value) { return sum + Number(value || 0); }, 0);
			}

			function getSeriesTrend(metric, values) {
				const validValues = (values || []).map(function(value) { return Number(value || 0); });
				if (!validValues.length) {
					return { label: 'Bez trendu', copy: 'Pre túto metriku zatiaľ nie sú dostupné hodnoty.', className: 'neutral' };
				}
				const windowSize = Math.min(3, validValues.length);
				const startValues = validValues.slice(0, windowSize);
				const endValues = validValues.slice(-windowSize);
				const start = summarizeMetricSeries(metric, startValues);
				const end = summarizeMetricSeries(metric, endValues);
				const delta = end - start;
				const ratio = start ? (delta / Math.abs(start)) * 100 : 0;
				if (Math.abs(delta) < 0.0001) {
					return { label: 'Stabilný rytmus', copy: 'Začiatok a koniec roka sú prakticky na rovnakej úrovni.', className: 'neutral' };
				}
				if (delta > 0) {
					return { label: 'Rastie o ' + numberFormatter.format(Math.abs(ratio)) + '%', copy: 'Posledná tretina roka je vyššie než prvé mesiace.', className: 'positive' };
				}
				return { label: 'Spomaľuje o ' + numberFormatter.format(Math.abs(ratio)) + '%', copy: 'Záver roka je pod úrovňou prvých mesiacov a treba sledovať momentum.', className: 'negative' };
			}

			function getExtremumMonth(months, values, mode) {
				if (!months.length || !values.length) {
					return { label: '—', value: 0 };
				}
				const result = months.reduce(function(best, month, index) {
					const value = Number(values[index] || 0);
					if (!best) {
						return { label: formatMonthShort(month), value: value };
					}
					if (mode === 'min' ? value < best.value : value > best.value) {
						return { label: formatMonthShort(month), value: value };
					}
					return best;
				}, null);
				return result || { label: '—', value: 0 };
			}

			function getAttainmentPercent(plan, forecast) {
				return Number(plan || 0) ? (Number(forecast || 0) / Number(plan || 0)) * 100 : 0;
			}

			function formatSignedPercent(value) {
				if (value == null || !isFinite(Number(value))) {
					return '—';
				}
				const numeric = Number(value || 0);
				const prefix = numeric > 0 ? '+' : numeric < 0 ? '−' : '';
				return prefix + numberFormatter.format(Math.abs(numeric)) + ' %';
			}

			function formatPercentMeta(value) {
				if (value == null || !isFinite(Number(value))) {
					return '';
				}
				return formatSignedPercent(value) + ' vs plán';
			}

			function renderSparklineBars(values, labels) {
				const numericValues = (values || []).map(function(value) { return Math.abs(Number(value || 0)); });
				const maxValue = Math.max.apply(null, numericValues.concat([0]));
				const monthLabels = labels || [];
				return numericValues.map(function(value, index) {
					const height = maxValue ? Math.max(12, Math.round((value / maxValue) * 100)) : 12;
					return ''
						+ '<span class="sparkline-point">'
						+ '<span class="sparkline-bar-wrap"><span class="sparkline-bar" style="height:' + escapeHtml(String(height)) + '%"></span></span>'
						+ '<span class="sparkline-label">' + escapeHtml(formatMonthMini(monthLabels[index])) + '</span>'
						+ '</span>';
				}).join('');
			}

			function formatMonthMini(label) {
				const parts = String(label || '').trim().split(/\s+/);
				if (!parts.length || !parts[0]) {
					return '';
				}
				return parts[0].slice(0, 3).toLowerCase();
			}

			function buildInsightHeadline(metric, snapshot, trend, peakMonth) {
				const deltaClass = getVarianceClass(snapshot.forecast - snapshot.plan);
				if (deltaClass === 'positive') {
					return metric + ' je nad plánom a jeho najsilnejší bod roka prichádza v ' + peakMonth.label + '.';
				}
				if (deltaClass === 'negative') {
					return metric + ' je pod plánom a potrebuje zvrátiť vývoj v ďalších mesiacoch.';
				}
				return metric + ' ide blízko plánu a rozhodovať bude hlavne momentum v druhej časti roka.';
			}

			function buildInsightCopy(metric, snapshot, closedMonthCount, openMonthCount, trend) {
				return 'Ročná hodnota ' + getDisplayForecastLabel() + ' je ' + formatMetric(snapshot.forecast, snapshot.format) + ', čo znamená ' + formatSignedMetric(snapshot.forecast - snapshot.plan, snapshot.format) + ' proti plánu. Uzavretých mesiacov: ' + closedMonthCount + ', otvorených: ' + openMonthCount + '. Trend momentálne hovorí: ' + trend.label + '.';
			}

			function renderStoryCard(label, value, copy, className) {
				return ''
					+ '<div class="story-card">'
					+ '<div class="story-card-label">' + escapeHtml(label) + '</div>'
					+ '<div class="story-card-value ' + escapeHtml(className || 'neutral') + '">' + escapeHtml(value) + '</div>'
					+ '<div class="story-card-copy">' + escapeHtml(copy) + '</div>'
					+ '</div>';
			}

			function renderQuarterJourneyCard(quarter) {
				return ''
					+ '<div class="month-card quarter-card ' + escapeHtml(quarter.className || 'neutral') + '">'
					+ '<div class="month-card-header">'
					+ '<div class="month-card-title">' + escapeHtml(quarter.key) + '</div>'
					+ '<span class="month-status">' + escapeHtml(quarter.status) + '</span>'
					+ '</div>'
					+ '<div class="month-card-metric">' + escapeHtml(getDisplayPlanLabel()) + ' <strong>' + escapeHtml(quarter.plan) + '</strong>' + (quarter.planMeta ? '<div class="month-card-metric-meta">' + escapeHtml(quarter.planMeta) + '</div>' : '') + '</div>'
					+ '<div class="month-card-metric">' + escapeHtml(quarter.realLabel || getDisplayRealLabel()) + ' <strong class="' + escapeHtml(quarter.realClass || 'neutral') + '">' + escapeHtml(quarter.real) + '</strong>' + (quarter.realMeta ? '<div class="month-card-metric-meta ' + escapeHtml(quarter.realClass || 'neutral') + '">' + escapeHtml(quarter.realMeta) + '</div>' : '') + '</div>'
					+ '<div class="month-card-metric">' + escapeHtml(getDisplayForecastLabel()) + ' <strong class="' + escapeHtml(quarter.forecastClass || 'neutral') + '">' + escapeHtml(quarter.forecast) + '</strong>' + (quarter.forecastMeta ? '<div class="month-card-metric-meta ' + escapeHtml(quarter.forecastClass || 'neutral') + '">' + escapeHtml(quarter.forecastMeta) + '</div>' : '') + '</div>'
					+ '<div class="month-card-metric">' + escapeHtml(getDisplayDeltaLabel()) + ' <strong class="' + escapeHtml(quarter.deltaClass || 'neutral') + '">' + escapeHtml(quarter.delta) + '</strong>' + (quarter.deltaMeta ? '<div class="month-card-metric-meta ' + escapeHtml(quarter.deltaClass || 'neutral') + '">' + escapeHtml(quarter.deltaMeta) + '</div>' : '') + '</div>'
					+ '</div>';
			}

			function renderMonthJourneyCard(monthCard) {
				return ''
					+ '<div class="month-card ' + escapeHtml(monthCard.className || 'neutral') + '">'
					+ '<div class="month-card-header">'
					+ '<div class="month-card-title">' + escapeHtml(monthCard.label) + '</div>'
					+ '<span class="month-status">' + escapeHtml(monthCard.status) + '</span>'
					+ '</div>'
					+ '<div class="month-card-metric">' + escapeHtml(getDisplayPlanLabel()) + ' <strong>' + escapeHtml(monthCard.plan) + '</strong>' + (monthCard.planMeta ? '<div class="month-card-metric-meta">' + escapeHtml(monthCard.planMeta) + '</div>' : '') + '</div>'
					+ '<div class="month-card-metric">' + escapeHtml(monthCard.realLabel || getDisplayRealLabel()) + ' <strong class="' + escapeHtml(monthCard.realClass || 'neutral') + '">' + escapeHtml(monthCard.real) + '</strong>' + (monthCard.realMeta ? '<div class="month-card-metric-meta ' + escapeHtml(monthCard.realClass || 'neutral') + '">' + escapeHtml(monthCard.realMeta) + '</div>' : '') + '</div>'
					+ '<div class="month-card-metric">' + escapeHtml(getDisplayForecastLabel()) + ' <strong class="' + escapeHtml(monthCard.forecastClass || 'neutral') + '">' + escapeHtml(monthCard.forecast) + '</strong>' + (monthCard.forecastMeta ? '<div class="month-card-metric-meta ' + escapeHtml(monthCard.forecastClass || 'neutral') + '">' + escapeHtml(monthCard.forecastMeta) + '</div>' : '') + '</div>'
					+ '<div class="month-card-metric">' + escapeHtml(getDisplayDeltaLabel()) + ' <strong class="' + escapeHtml(monthCard.deltaClass || 'neutral') + '">' + escapeHtml(monthCard.delta) + '</strong>' + (monthCard.deltaMeta ? '<div class="month-card-metric-meta ' + escapeHtml(monthCard.deltaClass || 'neutral') + '">' + escapeHtml(monthCard.deltaMeta) + '</div>' : '') + '</div>'
					+ '</div>';
			}

			function renderPill(label, value) {
				return '<span class="count-chip"><strong>' + escapeHtml(label) + ':</strong> ' + escapeHtml(String(value)) + '</span>';
			}

			function renderMetricPill(label, value) {
				return '<span class="metric-chip"><strong>' + escapeHtml(label) + ':</strong> ' + escapeHtml(String(value)) + '</span>';
			}

			function renderScopeCard(label, value, varianceClass, metaText, metaClass) {
				return '<div class="scope-card"><div class="scope-card-label">' + escapeHtml(label) + '</div><div class="scope-card-value ' + escapeHtml(varianceClass || 'neutral') + '">' + value + '</div>' + (metaText ? '<div class="scope-card-meta ' + escapeHtml(metaClass || 'neutral') + '">' + escapeHtml(metaText) + '</div>' : '') + '</div>';
			}

			function getNodeTypeLabel(type) {
				const normalized = String(type || '').toUpperCase();
				if (normalized === 'GLOBAL') { return 'SLOVENSKO'; }
				if (normalized === 'GF') { return 'GF'; }
				if (normalized === 'VKL') { return 'VKL'; }
				if (normalized === 'STORE') { return 'FILIÁLKA'; }
				return normalized;
			}

			function getVarianceClass(value) {
				if (Number(value || 0) > 0.0001) { return 'positive'; }
				if (Number(value || 0) < -0.0001) { return 'negative'; }
				return 'neutral';
			}

			function formatMetric(value, format) {
				if (format === 'currency') { return currencyFormatter.format(Number(value || 0)); }
				if (format === 'hours') { return numberFormatter.format(Number(value || 0)) + ' h'; }
				return numberFormatter.format(Number(value || 0));
			}

			function formatSignedMetric(value, format) {
				const numeric = Number(value || 0);
				const prefix = numeric > 0 ? '+' : numeric < 0 ? '−' : '';
				return prefix + formatMetric(Math.abs(numeric), format);
			}

			function formatAbbreviatedCurrency(value) {
				const numeric = Number(value || 0);
				const absolute = Math.abs(numeric);
				if (absolute >= 999500) {
					return numberFormatter.format(numeric / 1000000) + ' mil. €';
				}
				if (absolute >= 1000) {
					return numberFormatter.format(numeric / 1000) + ' tis. €';
				}
				return currencyFormatter.format(numeric);
			}

			function shortMetric(value, format) {
				const numeric = Number(value || 0);
				if (format === 'currency') {
					return formatAbbreviatedCurrency(numeric);
				}
				if (Math.abs(numeric) >= 1000) { return numberFormatter.format(numeric / 1000) + 'k'; }
				return formatMetric(numeric, format);
			}

			function formatMonthShort(label) {
				const parts = String(label || '').trim().split(/\s+/);
				if (parts.length < 2) { return label; }
				return parts[0].slice(0, 3) + ' ' + parts[1];
			}

			function setLoading(isLoading) {
				document.getElementById('loader').classList.toggle('hidden', !isLoading);
			}

			function showPageError(message) {
				const banner = document.getElementById('pageError');
				banner.textContent = message;
				banner.classList.remove('hidden');
			}

			function hidePageError() {
				document.getElementById('pageError').classList.add('hidden');
			}

			function handleLogout() {
				navigateToView('', { preserveLogin: false });
			}

			function navigateToView(view, options) {
				const config = options || {};
				google.script.run.withSuccessHandler(function(appUrl) { navigateToAppView(appUrl, view, config); }).withFailureHandler(function() { navigateToAppView('', view, config); }).getWebAppUrl();
			}

			function navigateToAppView(appUrl, view, options) {
				const config = options || {};
				const baseUrl = appUrl || window.location.href;
				const url = new URL(baseUrl);
				url.search = '';
				if (view) { url.searchParams.set('view', view); }
				if (config.preserveLogin !== false && state.loginValue) { url.searchParams.set('login', state.loginValue); }
				window.top.location.href = url.toString();
			}
		</script>
	</body>
</html>
